<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Watch Party Finder — Vancouver</title>

    <style>

        /* ─── RESET ─────────────────────────────────────────────────────────
           margin/padding 0 removes default browser spacing
           box-sizing border-box means padding is included in element width
           font-family uses system font — looks native on every device        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ─── TOPBAR ─────────────────────────────────────────────────────────
           sticky so it stays at top when user scrolls
           flexbox keeps all items on one horizontal line
           z-index 10 makes sure it sits above all other content              */
        .topbar {
            background-color: white;
            border-bottom: 0.5px solid #e0dfd8;
            padding: 12px 16px;          /* shorthand: top/bottom left/right */
            display: flex;               /* items sit in a row */
            align-items: center;         /* vertically centered */
            gap: 8px;                    /* space between items */
            position: sticky;            /* stays at top when scrolling */
            top: 0;
            z-index: 10;                 /* sits above other content */
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
        }

        /* green pill badge next to app name */
        .live-badge {
            background-color: #166534;   /* dark green */
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;            /* shorthand: top/bottom left/right */
            border-radius: 20px;         /* pill shape */
        }

        /* margin-left auto pushes location all the way to the right */
        .location {
            margin-left: auto;
            font-size: 12px;
            color: #888;
        }

        /* ─── SCORES STRIP ───────────────────────────────────────────────────
           today's live and upcoming scores scroll horizontally
           webkit scrollbar hidden so strip looks clean on desktop             */
        .scores-strip {
            background-color: white;
            border-bottom: 0.5px solid #e0dfd8;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;                    /* horizontal scroll */
            -webkit-overflow-scrolling: touch;   /* smooth scroll on iPhone */
        }

        .scores-strip::-webkit-scrollbar {
            display: none;                       /* hide scrollbar */
        }

        /* ─── NAV TABS ───────────────────────────────────────────────────────
           container scrolls horizontally on small screens
           each tab takes equal width with flex:1
           active tab gets green text and green underline                      */
        .nav-tabs {
            display: flex;
            background-color: white;
            border-bottom: 0.5px solid #e0dfd8;
            overflow-x: auto;                    /* scrolls on small screens */
            -webkit-overflow-scrolling: touch;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            flex: 1;                             /* tabs spread evenly across full width */
            text-align: center;
            padding: 10px 16px;                  /* breathing room around text */
            font-size: 13px;
            color: #888;                         /* grey when not active */
            cursor: pointer;                     /* hand cursor on hover */
            border-bottom: 2px solid transparent;/* invisible underline — becomes green when active */
            white-space: nowrap;                 /* prevents text wrapping to second line */
            flex-shrink: 0;                      /* prevents tabs squishing on small screens */
        }

        /* active tab — currently selected */
        .nav-tab.active {
            color: #166534;                      /* green text */
            border-bottom-color: #166534;        /* green underline */
            font-weight: 500;
        }

        /* ─── PANELS ─────────────────────────────────────────────────────────
           all panels hidden by default with display none
           only the panel with class active is shown
           max-width 680px keeps content readable on wide screens              */
        .panel {
            display: none;                       /* hidden by default */
            padding: 14px 16px;
            max-width: 680px;
            margin: 0 auto;                      /* centered on wide screens */
        }

        .panel.active {
            display: block;                      /* only active panel shows */
        }

    </style>
</head>
<body>

    <!-- TOPBAR — app name, live badge, location pushed to right -->
    <div class="topbar">
        <span>⚽</span>
        <span class="app-name">FIFA Watch Party Finder</span>
        <span class="live-badge">LIVE</span>
        <span class="location">📍 Vancouver</span>
    </div>

    <!-- SCORES STRIP — today's live and upcoming scores, scrolls horizontally -->
    <div class="scores-strip">
        <div class="loading">Loading scores...</div>
    </div>

    <!-- NAV TABS — switches between the 5 panels -->
    <div class="nav-tabs">
        <div class="nav-tab active">🗺 Map</div>
        <div class="nav-tab">📅 Matches</div>
        <div class="nav-tab">🏆 Groups</div>
        <div class="nav-tab">🌳 Bracket</div>
        <div class="nav-tab">🔥 Hype Intel</div>
    </div>

    <!-- PANELS — one per tab, only active panel is visible at a time -->
    <!--
        Map        → find venues near you
        Matches    → Live / Upcoming / Results filter chips
        Groups     → group stage standings
        Bracket    → full tournament tree
        Hype Intel → crowd predictions by neighbourhood
    -->
    <div class="panel active" id="panel-map"></div>
    <div class="panel" id="panel-matches"></div>
    <div class="panel" id="panel-groups"></div>
    <div class="panel" id="panel-bracket"></div>
    <div class="panel" id="panel-hype"></div>

</body>
</html>
